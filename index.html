<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naše rozprávky</title>
<style>
  :root{
    --polnocna:#1b1f3b;
    --sumrak:#2e3564;
    --hviezda:#f4c85b;
    --broskyna:#ff8966;
    --svit:#fbf6e9;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    background:var(--polnocna);
    color:var(--svit);
    font-family:-apple-system,"Segoe UI Rounded","Segoe UI",system-ui,sans-serif;
    overflow-x:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100%;
  }

  /* ambient night sky */
  .sky{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(2px 2px at 8% 20%, var(--svit) 0%, transparent 60%),
      radial-gradient(2px 2px at 22% 65%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 35% 15%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 48% 80%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 62% 30%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 75% 60%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 88% 25%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 95% 75%, var(--svit) 0%, transparent 60%);
    opacity:.55;
    animation:twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle{
    from{opacity:.35}
    to{opacity:.7}
  }
  @media (prefers-reduced-motion: reduce){
    .sky{animation:none}
  }

  header{
    position:relative;
    z-index:1;
    text-align:center;
    padding:clamp(24px,4vh,48px) 20px clamp(8px,2vh,16px);
  }
  header .moon{
    font-size:clamp(36px,5vw,56px);
    display:block;
    margin-bottom:8px;
  }
  h1{
    margin:0;
    font-size:clamp(28px,4.5vw,52px);
    font-weight:800;
    letter-spacing:.01em;
    color:var(--svit);
  }
  h1 span{color:var(--hviezda)}

  main{
    position:relative;
    z-index:1;
    flex:1;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:clamp(20px,3vw,40px);
    padding:clamp(16px,3vw,48px) clamp(24px,5vw,80px) clamp(48px,6vw,96px);
    max-width:1400px;
    margin:0 auto;
    width:100%;
  }

  .card{
    position:relative;
    background:var(--sumrak);
    border-radius:20px;
    padding:14px 14px 20px;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    outline:none;
  }
  .card:hover,
  .card:focus-visible{
    transform:translateY(-6px) scale(1.03);
    border-color:var(--hviezda);
    box-shadow:0 0 0 6px rgba(244,200,91,.18), 0 16px 32px rgba(0,0,0,.4);
  }
  .card .curtain{
    position:relative;
    border-radius:14px;
    overflow:hidden;
    aspect-ratio:4/3;
    background:#000;
  }
  .card .curtain img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card .curtain::before,
  .card .curtain::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:16%;
    background:linear-gradient(180deg,var(--broskyna),#c94f2e);
    box-shadow:inset 0 0 12px rgba(0,0,0,.4);
    transition:transform .25s ease;
    z-index:2;
  }
  .card .curtain::before{left:0;border-radius:0 40px 40px 0;transform-origin:left;}
  .card .curtain::after{right:0;border-radius:40px 0 0 40px;transform-origin:right;}
  .card:hover .curtain::before,
  .card:focus-visible .curtain::before{transform:translateX(-90%)}
  .card:hover .curtain::after,
  .card:focus-visible .curtain::after{transform:translateX(90%)}

  .card h2{
    margin:14px 4px 0;
    font-size:clamp(18px,2vw,24px);
    font-weight:700;
    text-align:center;
    color:var(--svit);
  }

  /* player view */
  #player{
    position:fixed;
    inset:0;
    z-index:10;
    background:#05060f;
    display:none;
    align-items:center;
    justify-content:center;
  }
  #player.open{display:flex}
  #player iframe{
    width:100%;
    height:100%;
    border:0;
  }
  #back{
    position:absolute;
    top:20px;
    left:20px;
    z-index:11;
    background:var(--broskyna);
    color:var(--polnocna);
    border:none;
    border-radius:999px;
    font-size:18px;
    font-weight:800;
    padding:14px 26px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
  }
  #back:hover,
  #back:focus-visible{
    outline:4px solid var(--hviezda);
  }

  footer{
    position:relative;
    z-index:1;
    text-align:center;
    padding:0 20px 24px;
    font-size:14px;
    opacity:.55;
  }
</style>
</head>
<body>
  <div class="sky"></div>

  <header>
    <span class="moon">🌙</span>
    <h1>Naše <span>rozprávky</span></h1>
  </header>

  <main id="grid"></main>

  <footer>Šípkami vyber, Enter spusti, Späť sa vráti</footer>

  <div id="player">
    <button id="back">← Späť</button>
    <iframe id="frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
  </div>

<script>
  const SHOWS = [
    { title:"Krtko",        playlist:"PLXkA6SvogZFtJSglsYUZ042JQz5htakBa", thumb:"gQ7OL53NF7U" },
    { title:"Macko Uško",   playlist:"PL5117944B5ABF7038",                  thumb:"JhyXj0WalFQ" },
    { title:"Včielka Maja", playlist:"PLXkA6SvogZFsJFIj7N72huMvrZE0IHZjP",  thumb:"HybfNxjNGJE" },
    { title:"Jurošík",      playlist:"PLhja9wo05YE0wbmATR0pY5VcdXL8gPA_p",  thumb:"_X3VKaLQ7ok" },
  ];

  const grid = document.getElementById("grid");
  const player = document.getElementById("player");
  const frame = document.getElementById("frame");
  const backBtn = document.getElementById("back");
  let lastFocused = null;

  SHOWS.forEach(show => {
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", "Pozrieť " + show.title);
    card.innerHTML = `
      <div class="curtain">
        <img src="https://i.ytimg.com/vi/${show.thumb}/hqdefault.jpg" alt="" loading="lazy">
      </div>
      <h2>${show.title}</h2>
    `;
    const open = () => openShow(show, card);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
    });
    grid.appendChild(card);
  });

  function openShow(show, card){
    lastFocused = card;
    frame.src = `https://www.youtube.com/embed/videoseries?list=${show.playlist}&autoplay=1`;
    player.classList.add("open");
    backBtn.focus();
  }

  function closePlayer(){
    player.classList.remove("open");
    frame.src = "";
    if (lastFocused) lastFocused.focus();
  }

  backBtn.addEventListener("click", closePlayer);
  document.addEventListener("keydown", e => {
    if (player.classList.contains("open") && (e.key === "Escape" || e.key === "Backspace")) {
      e.preventDefault();
      closePlayer();
    }
  });

  // arrow-key grid navigation (TV remote / keyboard friendly)
  document.addEventListener("keydown", e => {
    if (player.classList.contains("open")) return;
    if (!["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) return;
    const cards = Array.from(grid.children);
    const active = document.activeElement;
    let current = cards.includes(active) ? active : cards[0];
    if (!cards.includes(active)) { current.focus(); e.preventDefault(); return; }

    const rect = current.getBoundingClientRect();
    let best = null, bestDist = Infinity;
    for (const c of cards) {
      if (c === current) continue;
      const r = c.getBoundingClientRect();
      const dx = (r.left + r.width/2) - (rect.left + rect.width/2);
      const dy = (r.top + r.height/2) - (rect.top + rect.height/2);
      let ok = false;
      if (e.key === "ArrowLeft")  ok = dx < -10 && Math.abs(dy) < rect.height;
      if (e.key === "ArrowRight") ok = dx > 10  && Math.abs(dy) < rect.height;
      if (e.key === "ArrowUp")    ok = dy < -10 && Math.abs(dx) < rect.width;
      if (e.key === "ArrowDown")  ok = dy > 10  && Math.abs(dx) < rect.width;
      if (!ok) continue;
      const dist = Math.hypot(dx, dy);
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
    if (best) { best.focus(); e.preventDefault(); }
  });

  // autofocus first tile so remote works immediately
  if (grid.firstElementChild) grid.firstElementChild.focus();
</script>
</body>
</html>
