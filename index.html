<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naše rozprávky</title>
<style>
  :root{
    --polnocna:#1b1f3b;
    --sumrak:#2e3564;
    --hviezda:#f4c85b;
    --broskyna:#ff8966;
    --svit:#fbf6e9;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    background:var(--polnocna);
    color:var(--svit);
    font-family:-apple-system,"Segoe UI Rounded","Segoe UI",system-ui,sans-serif;
    overflow-x:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100%;
  }

  /* ambient night sky */
  .sky{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(2px 2px at 8% 20%, var(--svit) 0%, transparent 60%),
      radial-gradient(2px 2px at 22% 65%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 35% 15%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 48% 80%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 62% 30%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 75% 60%, var(--svit) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 88% 25%, var(--hviezda) 0%, transparent 60%),
      radial-gradient(2px 2px at 95% 75%, var(--svit) 0%, transparent 60%);
    opacity:.55;
    animation:twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle{
    from{opacity:.35}
    to{opacity:.7}
  }
  @media (prefers-reduced-motion: reduce){
    .sky{animation:none}
  }

  header{
    position:relative;
    z-index:1;
    text-align:center;
    padding:clamp(24px,4vh,48px) 20px clamp(8px,2vh,16px);
  }
  header .moon{
    font-size:clamp(36px,5vw,56px);
    display:block;
    margin-bottom:8px;
  }
  h1{
    margin:0;
    font-size:clamp(28px,4.5vw,52px);
    font-weight:800;
    letter-spacing:.01em;
    color:var(--svit);
  }
  h1 span{color:var(--hviezda)}

  main{
    position:relative;
    z-index:1;
    flex:1;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:clamp(20px,3vw,40px);
    padding:clamp(16px,3vw,48px) clamp(24px,5vw,80px) clamp(48px,6vw,96px);
    max-width:1400px;
    margin:0 auto;
    width:100%;
  }

  .card{
    position:relative;
    background:var(--sumrak);
    border-radius:20px;
    padding:14px 14px 20px;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    outline:none;
  }
  .card:hover,
  .card:focus-visible{
    transform:translateY(-6px) scale(1.03);
    border-color:var(--hviezda);
    box-shadow:0 0 0 6px rgba(244,200,91,.18), 0 16px 32px rgba(0,0,0,.4);
  }
  .card .curtain{
    position:relative;
    border-radius:14px;
    overflow:hidden;
    aspect-ratio:4/3;
    background:#000;
  }
  .card .curtain img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card .curtain::before,
  .card .curtain::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:16%;
    background:linear-gradient(180deg,var(--broskyna),#c94f2e);
    box-shadow:inset 0 0 12px rgba(0,0,0,.4);
    transition:transform .25s ease;
    z-index:2;
  }
  .card .curtain::before{left:0;border-radius:0 40px 40px 0;transform-origin:left;}
  .card .curtain::after{right:0;border-radius:40px 0 0 40px;transform-origin:right;}
  .card:hover .curtain::before,
  .card:focus-visible .curtain::before{transform:translateX(-90%)}
  .card:hover .curtain::after,
  .card:focus-visible .curtain::after{transform:translateX(90%)}

  .card h2{
    margin:14px 4px 0;
    font-size:clamp(18px,2vw,24px);
    font-weight:700;
    text-align:center;
    color:var(--svit);
  }

  /* player view */
  #player{
    position:fixed;
    inset:0;
    z-index:10;
    background:#05060f;
    display:none;
    align-items:center;
    justify-content:center;
  }
  #player.open{display:flex}
  #player iframe{
    width:100%;
    height:100%;
    border:0;
  }
  #back{
    position:absolute;
    top:20px;
    left:20px;
    z-index:11;
    background:var(--broskyna);
    color:var(--polnocna);
    border:none;
    border-radius:999px;
    font-size:18px;
    font-weight:800;
    padding:14px 26px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
  }
  #back:hover,
  #back:focus-visible{
    outline:4px solid var(--hviezda);
  }

  footer{
    position:relative;
    z-index:1;
    text-align:center;
    padding:0 20px 24px;
    font-size:14px;
    opacity:.55;
  }
</style>
</head>
<body>
  <div class="sky"></div>

  <header>
    <span class="moon">🌙</span>
    <h1>Naše <span>rozprávky</span></h1>
  </header>

  <main id="grid"></main>

  <footer>Šípkami vyber, Enter spusti, Späť sa vráti</footer>

  <div id="player">
    <button id="back">← Späť</button>
    <iframe id="frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
  </div>

<script>
  // ids: ručne zoradené video ID v chronologickom poradí (namiesto cudzích playlistov,
  // ktoré bývajú nekompletné/nezoradené/mŕtve) — prvé ID sa prehrá prvé, potom nasledujú ďalšie.

    // predošlý zdroj (kanál Elf Samael) mal embedovanie vypnuté takmer na všetkých videách -> nič sa neprehralo.
    // nahradené kanálom, kde je embed povolený, zoradené chronologicky podľa roku výroby.
    { title:"Krtko", ids:[
      "pzyYjJVtY1E","L8djAPmHKt8","zRfjNgxgWNE","ixEbge2GWNE","gpxQKKWIubY",
      "Mg0V7lDYAt8","jaiDRb5BkPc","Z4v3bLEo0I0","jpE6SgLZ1uE","zKIiVOSf9wM",
      "MTtQyRWe6ms","zlZd6Pr2my4","AsWm9gCMSCs","VUspIm9gDRE","vdZ7XpS0ZIQ",
    ]},
    { title:"Macko Uško", ids:[
      "MMYWUf4Y6xY","nEVNPiNDo74","9F787OtC8bk","QDVb6sfiY-0","LBMf4T0ueXE","EYeRqt0qeqg",
      "S7E5li26bd0","mavH_n6COmo","2pcy_aUa2Bc","6tetkhmB8Hs","VexKcXa-cUM","rPo1gF0FpDU",
      "PCfxkY6JXKw","_FiCbZ-QA1M","O4XWwcQ2G10","rKIXaS9IAzc","NUf7aVl7aVQ","pbP53GN4K44",
      "1RVfcRSEzxQ","iI3zBA6KfXg","YGwReiCNjGc","9y2PJaeCfwI","s4QyqQEYAwc","mjAsFrjLpiQ",
      "TlCFQ7WhNU8","lf0ZMj3003c","9eI1p5kI3t8","ggKzDd9yhyM","__PTig5KV-w","FGNaXX8OIKw",
      "3h0x23RU-sE","uYKlcwb3sa8","tuloUtkEH5U","8E8Ng9vgF50",
    ]},
    // pôvodná séria z roku 1975, overené cez YouTube oEmbed (nie novší 3D reboot)
    { title:"Včielka Maja", playlist:"PLXkA6SvogZFsJFIj7N72huMvrZE0IHZjP", thumb:"LdVoMNXKSsM" },
    // len pôvodná staršia séria (epizódy 1-28), bez neskoršieho pokračovania z roku 2010
    { title:"Jurošík", ids:[
      "_QM8ZNeB14w","_KzfFAw1-kU","3zcDJsV3T_4","jaJ5IMfCwAg","HNCID6NJu3I","tsw5LwVbMek",
      "6W3uiIy5KGY","2QELggY41Qs","DnXRhFTGga0","t1F6rH4wht0","vJr_uphbC-E","exhK8VN1IXY",
      "ac9owSxMEcE","j3Pyfn5UPpg","RAAL4vPaGjo","Pd13A_VRtJI","Quis95eqdxw","Qc483rpaHI0",
      "Locknq-5fQY","CSKc1ZLY8es","zTss4DkEvXw","YoTiJjNrmvE","j4HUeDCSVvc","0DjuHoPU_IY",
      "yZJ22Q2TIE8","KWfX6TAsQpE",
    ]},
    // zdroj čísluje len časť dielov (2,3,5,7 potvrdené) - zvyšné poradie je najlepší odhad podľa témy
    { title:"Bol raz jeden život", ids:[
      "ONdRbp3-Ek4","pX9cfgnoSNs","N5sxGajw520","xmhhAZ6ZoKQ","Cdc3Dr4_wEo","dhMT4y4860w",
      "IzuIsrSaVDA","1kDRLbiTBzk","gUc8JaJAGuE","BWbPfiiHNAM","TTni1Q2VzVU","WwN-X2kicSA",
      "8TgNHyPT5wU","dLdbpJCMrwo","OJG2uPaVDnU","KebhBj4JbtE","FAXShzA0BK4","tqEtXlKE_HQ",
      "YeJn488YnTQ","WXPpLXYJejs","9b2Yo-Ko5NM","mTe48kJrrZg","0xCOTmIH5f4","gCQsombikKQ",
    ]},
    { title:"Bob a Bobek", ids:[
      "u3k7RRRyOhE","hVnELx7Q-no","dbtSgzv1qoQ","9CULRFDyLwA","jETVYDhPPDE","peyYS-TbZbg",
      "kQ_ZjpxIivE","YLiJmkLS9ao","pfHHCzV0Jt4","MbTV0-F9YB0","GS6FxDQDCv0","lKtrhDDfB5w",
      "C3ruPSX49NQ","26ah4bYY9kA","PBHBqkZfaTI","i_YxDEH7JWk","qaDyUYajYE0","guUSWBSl3v8",
      "yuUwf4oK1Ks","HrMcJW9S1_s","C-HZCnTeO2E","S6arA7eds8E","zxnUrcO4GL8","h5-zMkhHcKo",
      "1lDaevNhntw","8NGOLOFvf7E","yT875RTzg2w","ahARUQ3Uo3U","xrXD5MQeol0","pVS_xo_uKzw",
      "Wa6gRI80r3A","8aRan8bFTsI","XXSkYfedZZs","KnGgEA3woCs","yIG5pcZoLDc",
    ]},
    { title:"Ferdo Mravec", ids:[
      "iBID6eIEpLA","t6y3U5uwC8E","pF-skW-VzK0","BZwYR3CGOaI","1udOlWLLSPc","7OwHYsctVTU",
      "1ByshmdYkA4","GPDUZiJeZ0M","QZMelDTHlTI","jpzR2Rb3Q60","tNcWuCnKxAY","uHZK0HH81sQ",
      "X99-L7nfuhM","yZBQ9di4wYs","8uGHnL0BL8Y","IQwQ_prguvw","1tbBygtoBWA","yU_S7RvSngA",
      "Ja3HejUfj4o","utFAu_sVnqs","m6eVMat_LeU","-qtV0i2WXxA","zIXfH8l5pnk","9L1Y0wtx4T0",
      "JrKzcm9dmSA","h_weFw3wOpQ","bHEhdliD8AA","e5JYivSfRQs","3M-b1B1OoXw","aSZMavxt-ZI",
      "GLK9IapVbEU","000wW7j3BH4","MnevmwknLUo","8MaViN1xLCQ","qsIvC0XGkYs","5xosBuFTcCE",
      "R-wFOGIAh1o","7x4oAt97LmE","QvN_nzMecrM","vE8G2HmXwpo",
    ]},
  ];

  const grid = document.getElementById("grid");
  const player = document.getElementById("player");
  const frame = document.getElementById("frame");
  const backBtn = document.getElementById("back");
  let lastFocused = null;

  SHOWS.forEach(show => {
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", "Pozrieť " + show.title);
    const thumbId = show.thumb || show.ids[0];
    card.innerHTML = `
      <div class="curtain">
        <img src="https://i.ytimg.com/vi/${thumbId}/hqdefault.jpg" alt="" loading="lazy">
      </div>
      <h2>${show.title}</h2>
    `;
    const open = () => openShow(show, card);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
    });
    grid.appendChild(card);
  });

  function openShow(show, card){
    lastFocused = card;
    if (show.ids) {
      const first = show.ids[0];
      const rest = show.ids.slice(1).join(",");
      frame.src = `https://www.youtube.com/embed/${first}?playlist=${rest}&autoplay=1&rel=0`;
    } else {
      frame.src = `https://www.youtube.com/embed/videoseries?list=${show.playlist}&index=1&autoplay=1&rel=0`;
    }
    player.classList.add("open");
    backBtn.focus();
  }

  function closePlayer(){
    player.classList.remove("open");
    frame.src = "";
    if (lastFocused) lastFocused.focus();
  }

  backBtn.addEventListener("click", closePlayer);
  document.addEventListener("keydown", e => {
    if (player.classList.contains("open") && (e.key === "Escape" || e.key === "Backspace")) {
      e.preventDefault();
      closePlayer();
    }
  });

  // arrow-key grid navigation (TV remote / keyboard friendly)
  document.addEventListener("keydown", e => {
    if (player.classList.contains("open")) return;
    if (!["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) return;
    const cards = Array.from(grid.children);
    const active = document.activeElement;
    let current = cards.includes(active) ? active : cards[0];
    if (!cards.includes(active)) { current.focus(); e.preventDefault(); return; }

    const rect = current.getBoundingClientRect();
    let best = null, bestDist = Infinity;
    for (const c of cards) {
      if (c === current) continue;
      const r = c.getBoundingClientRect();
      const dx = (r.left + r.width/2) - (rect.left + rect.width/2);
      const dy = (r.top + r.height/2) - (rect.top + rect.height/2);
      let ok = false;
      if (e.key === "ArrowLeft")  ok = dx < -10 && Math.abs(dy) < rect.height;
      if (e.key === "ArrowRight") ok = dx > 10  && Math.abs(dy) < rect.height;
      if (e.key === "ArrowUp")    ok = dy < -10 && Math.abs(dx) < rect.width;
      if (e.key === "ArrowDown")  ok = dy > 10  && Math.abs(dx) < rect.width;
      if (!ok) continue;
      const dist = Math.hypot(dx, dy);
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
    if (best) { best.focus(); e.preventDefault(); }
  });

  // autofocus first tile so remote works immediately
  if (grid.firstElementChild) grid.firstElementChild.focus();
</script>
